name: Ingest RSS Feeds
on:
  # Lets you click "Run workflow" manually in GitHub Actions tab
  workflow_dispatch:
  # Runs every 15 minutes, offset from :00/:15/:30/:45 to avoid GitHub's
  # top-of-quarter-hour scheduler congestion -- the same reason ingest.yml
  # uses "17 */3 * * *" instead of a clean hour mark. This workflow's original
  # */15 schedule fired on the congested marks and, per GitHub Actions run
  # history, never actually triggered on schedule in 6 days (only manual
  # workflow_dispatch runs) -- this offset is the fix.
  schedule:
    - cron: '4,19,34,49 * * * *'
jobs:
  ingest-rss:
    runs-on: ubuntu-latest
    # Hard backstop against hangs. GitHub Actions defaults to a 6-hour job
    # timeout if unset -- confirmed via a real run (#11, 2026-07-13) that sat
    # "In progress" for 3h47m+ on what should be a 1-2 minute job (13 feeds,
    # each with a 10s internal timeout, plus clustering). 10 minutes is
    # generous headroom and guarantees a future hang can't eat hours again,
    # regardless of which specific call is the culprit.
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Run RSS ingestion script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node ingest-rss.js
