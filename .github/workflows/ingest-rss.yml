name: Ingest RSS Feeds
on:
  # Lets you click "Run workflow" manually in GitHub Actions tab
  workflow_dispatch:
  # Runs every 15 minutes. This is only viable because the repo is public --
  # a private repo would burn through its 2,000 free Actions-minutes/month
  # cap in days at this frequency (public repos have no such cap).
  schedule:
    - cron: '*/15 * * * *'
jobs:
  ingest-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Run RSS ingestion script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node ingest-rss.js
